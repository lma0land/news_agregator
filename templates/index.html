<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>News Aggregator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>News Aggregator</h1>

<button onclick="toggleTheme()">Toggle Dark Mode</button>

<!-- SEARCH -->
<form class="search-form" method="GET">
    <input 
        type="text" 
        name="search" 
        placeholder="Search news..."
        value="{{ request.args.get('search', '') }}"
    >
    <button type="submit">Search</button>
</form>

<!-- FILTERS -->
<div class="filters">
    <a href="/" class="filter">All</a>
    <a href="/?category=Спорт" class="filter">Sport</a>
    <a href="/?category=Технологии" class="filter">Tech</a>
    <a href="/?category=Политика" class="filter">Politics</a>
</div>

<!-- CARDS -->
<div class="container">

{% for article in articles %}

<div class="card">

    <h2>{{ article[0] }}</h2>

    <div class="content">
        {{ article[3] | safe }}
    </div>

    <p><b>Источник:</b> {{ article[1] }}</p>
    <p><b>Категория:</b> {{ article[5] }}</p>

    <a href="{{ article[2] }}" target="_blank">Read more</a>

    <div class="tags">
        {% for tag in (article[6] or '').split(',') if tag %}
            <span class="tag">#{{ tag }}</span>
        {% endfor %}
    </div>

</div>

{% endfor %}

</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
